<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Watch TV Show - Sharky Movies 2</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <meta name="theme-color" content="#e50914" />
</head>

<body class="player-page">

  <header class="player-header">
    <a href="index.html" class="logo">Sharky Movies 2</a>
    <a href="index.html" class="player-home-link">← Back Home</a>
  </header>

  <main class="watch-layout">

    <section class="watch-top">
      <img id="poster" class="watch-poster" src="" alt="TV poster" />

      <div class="watch-meta">
        <h1 id="title">Loading...</h1>

        <div class="watch-info-line" id="infoLine">
          <span>TV Show</span>
          <span>HD</span>
        </div>

        <p id="desc" class="watch-desc"></p>

        <div class="tv-controls">
          <select id="seasonSelect" class="tv-select"></select>
          <select id="episodeSelect" class="tv-select"></select>
        </div>

        <div class="server-panel">
          <div class="server-title">Servers</div>
          <div class="server-buttons" id="serverButtons"></div>
          <div class="server-note">
            Your selected season and episode are saved automatically.
          </div>
        </div>
      </div>
    </section>

    <section class="player-container">
      <div class="player-shell">

        <div class="player-loading" id="playerLoading">
          <div class="spinner"></div>
          <div class="loading-text">Loading player...</div>
        </div>

        <div id="clickShield" class="click-shield" aria-hidden="true">
          <div class="click-shield-card">
            <div class="click-shield-title">Press OK / Click to start</div>
            <div class="click-shield-sub">
              This helps on TV browsers and prepares the player.
            </div>
            <button id="clickShieldBtn" class="click-shield-btn" type="button">
              Start ▶
            </button>
          </div>
        </div>

        <iframe
          id="player"
          allowfullscreen
          allow="fullscreen; autoplay; picture-in-picture"
        ></iframe>

      </div>
    </section>

  </main>

  <footer class="player-footer">© 2026 Sharky Movies 2</footer>

  <script>
    const API_KEY = "47745852f22c21e3362f4907231538e1";

    const params = new URLSearchParams(location.search);
    const tvId = params.get("id");

    const urlSeason = Number(params.get("s")) || 1;
    const urlEpisode = Number(params.get("e")) || 1;

    const poster = document.getElementById("poster");
    const title = document.getElementById("title");
    const desc = document.getElementById("desc");
    const infoLine = document.getElementById("infoLine");
    const serverButtons = document.getElementById("serverButtons");
    const seasonSelect = document.getElementById("seasonSelect");
    const episodeSelect = document.getElementById("episodeSelect");
    const player = document.getElementById("player");
    const playerLoading = document.getElementById("playerLoading");
    const clickShield = document.getElementById("clickShield");
    const clickShieldBtn = document.getElementById("clickShieldBtn");

    let activeServer = "vidking";
    let currentShow = null;
    let selectedSeason = urlSeason;
    let selectedEpisode = urlEpisode;
    let wakeLock = null;
    let keepAliveTimer = null;

    const STORAGE_CONTINUE = "sharky_movies_2_continue_watching";
    const STORAGE_TV_PROGRESS = "sharky_movies_2_tv_progress";

    const SERVERS = [
  {
    key: "vidking",
    name: "VidKing (ads)",
    build: (id, s, e) =>
      `https://www.vidking.net/embed/tv/${id}/${s}/${e}?color=e50914&nextEpisode=true&episodeSelector=true`,
    policy: {
      referrerPolicy: "strict-origin-when-cross-origin",
    },
    shield: false,
  },
  {
    key: "vidsrc",
    name: "Vidsrc (ads)",
    build: (id, s, e) =>
      `https://vidsrc-embed.ru/embed/tv/${id}/${s}/${e}`,
    policy: {
      referrerPolicy: "strict-origin-when-cross-origin",
    },
    shield: true,
  },

  // ✅ Your new TV servers
  {
    key: "vidrock_tv",
    name: "VidRock (ads)",
    urlTemplate: "https://vidrock.net/tv/{id}/{season}/{episode}",
    policy: { referrerPolicy: "strict-origin-when-cross-origin" },
    shield: true,
  },
  {
    key: "videasy_tv",
    name: "Videasy (ads)",
    urlTemplate: "https://player.videasy.net/tv/{id}/{season}/{episode}",
    policy: { referrerPolicy: "strict-origin-when-cross-origin" },
    shield: true,
  },
  {
    key: "2embed_tv",
    name: "2Embed (ads)",
    urlTemplate: "https://www.2embed.cc/embedtv/{id}&s={season}&e={episode}",
    policy: { referrerPolicy: "strict-origin-when-cross-origin" },
    shield: true,
  },
  {
    key: "vidup_tv",
    name: "VidUp (ads)",
    urlTemplate: "https://vidup.to/tv/{id}/{season}/{episode}?autoPlay=true",
    policy: { referrerPolicy: "strict-origin-when-cross-origin" },
    shield: true,
  },
  {
    key: "vidfast_tv",
    name: "VidFast (ads)",
    urlTemplate: "https://vidfast.pro/tv/{id}/{season}/{episode}?autoPlay=true",
    policy: { referrerPolicy: "strict-origin-when-cross-origin" },
    shield: true,
  },
];

    /*
      Add your own legal TV player provider here.

      You get:
      - server
      - id
      - season
      - episode

      Example:
      return `https://your-legal-provider.com/embed/tv/${id}/${season}/${episode}`;

      Leave empty for now if you only want the UI ready.
    */
    function getTvEmbedUrl(server, id, season, episode) {
      if (typeof server.build === "function") {
        return server.build(id, season, episode);
      }

      if (server.urlTemplate && typeof server.urlTemplate === "string") {
        return server.urlTemplate
        .replaceAll("{id}", encodeURIComponent(id))
        .replaceAll("{season}", encodeURIComponent(season))
        .replaceAll("{episode}", encodeURIComponent(episode));
    }

    return "";
  }
    

    function showLoading(on) {
      playerLoading.style.display = on ? "flex" : "none";
    }

    function showShield(on) {
      clickShield.classList.toggle("show", !!on);
      clickShield.setAttribute("aria-hidden", on ? "false" : "true");

      if (on) {
        setTimeout(() => clickShieldBtn.focus(), 0);
      }
    }

    function disarmShield() {
      showShield(false);
      startPlaybackPower();

      try {
        player.focus();
      } catch {}
    }

    clickShieldBtn.addEventListener("click", disarmShield);

    clickShield.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      disarmShield();
    });

    window.addEventListener("keydown", (e) => {
      if (!clickShield.classList.contains("show")) return;

      if (e.key === "Enter" || e.key === " " || e.key === "OK") {
        e.preventDefault();
        disarmShield();
      }
    });

    async function requestWakeLock() {
      try {
        if (!("wakeLock" in navigator)) return;
        if (wakeLock) return;

        wakeLock = await navigator.wakeLock.request("screen");
      } catch {}
    }

    async function releaseWakeLock() {
      try {
        if (wakeLock) {
          await wakeLock.release();
          wakeLock = null;
        }
      } catch {}
    }

    function startKeepAlive() {
      stopKeepAlive();

      keepAliveTimer = setInterval(() => {
        window.dispatchEvent(new Event("resize"));
      }, 60000);
    }

    function stopKeepAlive() {
      if (keepAliveTimer) clearInterval(keepAliveTimer);
      keepAliveTimer = null;
    }

    function startPlaybackPower() {
      requestWakeLock();
      startKeepAlive();
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        requestWakeLock();
      } else {
        releaseWakeLock();
      }
    });

    window.addEventListener("pagehide", () => {
      stopKeepAlive();
      releaseWakeLock();
    });

    window.addEventListener("beforeunload", () => {
      stopKeepAlive();
      releaseWakeLock();
    });

    function removeEmptyPlayer() {
      const oldEmpty = document.getElementById("emptyPlayer");
      if (oldEmpty) oldEmpty.remove();
    }

    function showEmptyPlayer(message) {
      removeEmptyPlayer();

      player.insertAdjacentHTML("afterend", `
        <div class="empty-player" id="emptyPlayer">
          <div>
            <h2>Player not connected</h2>
            <p>${message}</p>
          </div>
        </div>
      `);
    }

    function applyIframePolicy(server) {
    player.removeAttribute("sandbox");
    player.removeAttribute("referrerpolicy");

    player.setAttribute("allow", "fullscreen; autoplay; picture-in-picture");

    if (server.policy?.sandbox) {
      player.setAttribute("sandbox", server.policy.sandbox);
    }

    if (server.policy?.referrerPolicy) {
      player.setAttribute("referrerpolicy", server.policy.referrerPolicy);
    }

    if (server.referrerPolicy) {
      player.setAttribute("referrerpolicy", server.referrerPolicy);
    }
  }

    function getStoredTvProgress(id) {
      try {
        const allProgress = JSON.parse(localStorage.getItem(STORAGE_TV_PROGRESS)) || {};
        return allProgress[id] || null;
      } catch {
        return null;
      }
    }

    function saveTvProgress() {
      if (!tvId) return;

      let allProgress = {};

      try {
        allProgress = JSON.parse(localStorage.getItem(STORAGE_TV_PROGRESS)) || {};
      } catch {
        allProgress = {};
      }

      allProgress[tvId] = {
        season: selectedSeason,
        episode: selectedEpisode,
        updatedAt: Date.now()
      };

      localStorage.setItem(STORAGE_TV_PROGRESS, JSON.stringify(allProgress));
    }

    function saveContinueWatching() {
      if (!currentShow) return;

      let list = [];

      try {
        list = JSON.parse(localStorage.getItem(STORAGE_CONTINUE)) || [];
      } catch {
        list = [];
      }

      const item = {
        id: currentShow.id,
        media_type: "tv",
        sharky_title: currentShow.name,
        sharky_date: currentShow.first_air_date || "",
        poster_path: currentShow.poster_path,
        backdrop_path: currentShow.backdrop_path,
        vote_average: currentShow.vote_average,
        overview: currentShow.overview,
        season: selectedSeason,
        episode: selectedEpisode,
        lastWatched: Date.now()
      };

      const filtered = list.filter((x) => {
        return !(Number(x.id) === Number(currentShow.id) && x.media_type === "tv");
      });

      localStorage.setItem(STORAGE_CONTINUE, JSON.stringify([item, ...filtered].slice(0, 20)));
      saveTvProgress();
    }

    function updateUrlWithoutReload() {
      if (!tvId) return;

      const newUrl = `tv.html?id=${encodeURIComponent(tvId)}&s=${encodeURIComponent(selectedSeason)}&e=${encodeURIComponent(selectedEpisode)}`;
      history.replaceState(null, "", newUrl);
    }

    function renderServers() {
      serverButtons.innerHTML = "";

      SERVERS.forEach((server) => {
        const btn = document.createElement("button");
        btn.className = "server-btn";
        btn.textContent = server.name;
        btn.dataset.server = server.key;

        btn.addEventListener("click", () => loadServer(server.key));

        serverButtons.appendChild(btn);
      });

      setActiveServerButton();
    }

    function setActiveServerButton() {
      document.querySelectorAll(".server-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.server === activeServer);
      });
    }

    function loadServer(serverKey) {
      const server = SERVERS.find((s) => s.key === serverKey);
      if (!server || !tvId) return;

      activeServer = serverKey;
      setActiveServerButton();

      showLoading(true);
      showShield(!!server.shield);
      removeEmptyPlayer();
      applyIframePolicy(server);

      saveContinueWatching();
      updateUrlWithoutReload();

      player.src = "about:blank";

      setTimeout(() => {
        const url = getTvEmbedUrl(server, tvId, selectedSeason, selectedEpisode);

        if (!url) {
          showLoading(false);
          showEmptyPlayer("Add your legal TV provider inside getTvEmbedUrl().");
          return;
        }

        player.src = url;
      }, 80);
    }

    player.addEventListener("load", () => {
      setTimeout(() => showLoading(false), 350);
    });

    async function loadEpisodesForSeason(seasonNumber, preferredEpisode = 1) {
      episodeSelect.innerHTML = `<option>Loading episodes...</option>`;

      try {
        const res = await fetch(
          `https://api.themoviedb.org/3/tv/${tvId}/season/${seasonNumber}?api_key=${API_KEY}&language=en-US`
        );

        if (!res.ok) {
          throw new Error("Failed to load episodes.");
        }

        const season = await res.json();
        const episodes = season.episodes || [];

        episodeSelect.innerHTML = "";

        if (!episodes.length) {
          const option = document.createElement("option");
          option.value = "1";
          option.textContent = "Episode 1";
          episodeSelect.appendChild(option);

          selectedEpisode = 1;
          saveContinueWatching();
          updateUrlWithoutReload();
          loadServer(activeServer);
          return;
        }

        episodes.forEach((episode) => {
          const option = document.createElement("option");
          option.value = episode.episode_number;
          option.textContent = `Episode ${episode.episode_number}: ${episode.name || "Untitled"}`;
          episodeSelect.appendChild(option);
        });

        const episodeExists = episodes.some((ep) => Number(ep.episode_number) === Number(preferredEpisode));
        selectedEpisode = episodeExists ? Number(preferredEpisode) : Number(episodes[0].episode_number);

        episodeSelect.value = selectedEpisode;

        saveContinueWatching();
        updateUrlWithoutReload();
        loadServer(activeServer);
      } catch (error) {
        console.error(error);

        episodeSelect.innerHTML = `<option>Failed to load episodes</option>`;
        showLoading(false);
        showEmptyPlayer("Episodes could not be loaded.");
      }
    }

    function renderSeasons(show) {
      seasonSelect.innerHTML = "";

      const seasons = (show.seasons || []).filter((season) => season.season_number > 0);

      if (!seasons.length) {
        const option = document.createElement("option");
        option.value = "1";
        option.textContent = "Season 1";
        seasonSelect.appendChild(option);

        selectedSeason = 1;
        loadEpisodesForSeason(1, selectedEpisode);
        return;
      }

      seasons.forEach((season) => {
        const option = document.createElement("option");
        option.value = season.season_number;
        option.textContent = `Season ${season.season_number}`;
        seasonSelect.appendChild(option);
      });

      const storedProgress = getStoredTvProgress(tvId);

      if (!params.get("s") && storedProgress) {
        selectedSeason = Number(storedProgress.season) || 1;
        selectedEpisode = Number(storedProgress.episode) || 1;
      }

      const seasonExists = seasons.some((season) => Number(season.season_number) === Number(selectedSeason));
      selectedSeason = seasonExists ? selectedSeason : Number(seasons[0].season_number);

      seasonSelect.value = selectedSeason;

      loadEpisodesForSeason(selectedSeason, selectedEpisode);
    }

    seasonSelect.addEventListener("change", () => {
      selectedSeason = Number(seasonSelect.value);
      selectedEpisode = 1;

      saveTvProgress();
      updateUrlWithoutReload();
      loadEpisodesForSeason(selectedSeason, selectedEpisode);
    });

    episodeSelect.addEventListener("change", () => {
      selectedEpisode = Number(episodeSelect.value);

      saveContinueWatching();
      updateUrlWithoutReload();
      loadServer(activeServer);
    });

    async function loadShowDetails() {
      if (!tvId) {
        title.textContent = "No TV show selected.";
        desc.textContent = "Go back to the homepage and choose a TV show.";
        showLoading(false);
        showShield(false);
        showEmptyPlayer("No TMDB TV ID was provided in the URL.");
        return;
      }

      try {
        const res = await fetch(
          `https://api.themoviedb.org/3/tv/${tvId}?api_key=${API_KEY}&language=en-US`
        );

        if (!res.ok) {
          throw new Error("Failed to load TV show.");
        }

        const show = await res.json();
        currentShow = show;

        const year = show.first_air_date ? show.first_air_date.slice(0, 4) : "N/A";
        const rating = show.vote_average ? Number(show.vote_average).toFixed(1) : "N/A";
        const seasons = show.number_of_seasons || 0;

        title.textContent = `${show.name || "Untitled"} ${year !== "N/A" ? `(${year})` : ""}`;
        desc.textContent = show.overview || "No overview available.";

        poster.src = show.poster_path
          ? "https://image.tmdb.org/t/p/w500" + show.poster_path
          : "https://via.placeholder.com/500x750/111111/ffffff?text=No+Poster";

        infoLine.innerHTML = `
          <span>TV Show</span>
          <span>${year}</span>
          <span>HD</span>
          <span>★ ${rating}</span>
          <span>${seasons} season${seasons === 1 ? "" : "s"}</span>
        `;

        document.title = `Watch ${show.name || "TV Show"} - Sharky Movies 2`;

        renderSeasons(show);
      } catch (error) {
        console.error(error);

        title.textContent = "Failed to load TV show.";
        desc.textContent = "Try going back and opening the show again.";

        showLoading(false);
        showShield(false);
        showEmptyPlayer("TV show details could not be loaded.");
      }
    }

    renderServers();
    loadShowDetails();
  </script>
</body>
</html>
